name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to sync (for example: v0.1.0)"
        required: true
        type: string
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to sync (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-tap:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'v')
    env:
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || 'vincentkoc/homebrew-tap' }}
    steps:
      - name: Validate tap configuration
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "Secret HOMEBREW_TAP_GITHUB_TOKEN is required."
            exit 1
          fi
          if [ "$(gh api "repos/${TAP_REPO}" --jq '.permissions.push // false')" != "true" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN must have push access to ${TAP_REPO}."
            exit 1
          fi

      - name: Checkout tap repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Update formula
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          SOURCE_URL="https://github.com/${SOURCE_REPO}/archive/refs/tags/${TAG}.tar.gz"

          curl -fsSL "${SOURCE_URL}" -o /tmp/notcrawl-src.tar.gz
          SHA256="$(shasum -a 256 /tmp/notcrawl-src.tar.gz | awk '{print $1}')"

          mkdir -p Formula
          cat > Formula/notcrawl.rb <<EOF
          class Notcrawl < Formula
            desc "Local-first Notion crawler into SQLite and normalized Markdown"
            homepage "https://github.com/${SOURCE_REPO}"
            url "${SOURCE_URL}"
            sha256 "${SHA256}"
            license "MIT"
            version "${VERSION}"

            depends_on "go" => :build

            def install
              system "go", "build", *std_go_args(ldflags: "-s -w"), "./cmd/notcrawl"
              pkgshare.install "config.example.toml"
              doc.install "README.md", "LICENSE", "SPEC.md"
            end

            test do
              assert_match "Usage of notcrawl:", shell_output("#{bin}/notcrawl --help")
            end
          end
          EOF

      - name: Commit and push formula update
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          set -euo pipefail
          git add Formula/notcrawl.rb
          if git diff --cached --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update notcrawl formula for ${TAG}"
          git pull --rebase origin main
          git push
