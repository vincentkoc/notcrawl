db_path = "~/.notcrawl/notcrawl.db"
cache_dir = "~/.notcrawl/cache"
markdown_dir = "~/.notcrawl/pages"

[notion.desktop]
enabled = true
path = ""

[notion.api]
enabled = true
token_env = "NOTION_TOKEN"
base_url = "https://api.notion.com/v1"
version = "2026-03-11"

[share]
remote = ""
branch = "main"
repo_path = "~/.notcrawl/share"
stale_after = "1h"
